openapi: "3.0.3"
info:
  title: "gitbox API Contract"
  description: |
    Documents the two integration surfaces of the gitbox project:

    **Section A -- Provider APIs Consumed**: HTTP endpoints called by the Go
    `pkg/provider` package via `net/http` to interact with GitHub, GitLab,
    Gitea/Forgejo, and Bitbucket hosting APIs.

    **Section B -- Wails GUI Bindings**: Go methods on the `App` struct
    (`cmd/gui/app.go`) exposed to the Svelte frontend via Wails v2 bindings.
    These are NOT HTTP endpoints; they are documented using OpenAPI `x-`
    extensions under synthetic `/wails/{MethodName}` paths.
  version: "2.0.0"
  contact:
    name: "gitbox"
    url: "https://github.com/LuisPalacios/gitbox"

tags:
  # --- Section A: Provider APIs Consumed ---
  - name: github
    description: "GitHub REST API v3 endpoints consumed by pkg/provider/github.go"
  - name: gitlab
    description: "GitLab REST API v4 endpoints consumed by pkg/provider/gitlab.go"
  - name: gitea
    description: "Gitea/Forgejo REST API v1 endpoints consumed by pkg/provider/gitea.go"
  - name: bitbucket
    description: "Bitbucket Cloud REST API v2 endpoints consumed by pkg/provider/bitbucket.go"
  # --- Section B: Wails Bindings ---
  - name: wails-lifecycle
    description: "App lifecycle bindings (version, first-run, config errors, window)"
  - name: wails-config
    description: "Configuration read/reload/path bindings"
  - name: wails-settings
    description: "Global settings (folder, periodic sync, view mode, autostart)"
  - name: wails-status
    description: "Repository sync status bindings"
  - name: wails-clone
    description: "Clone repository bindings"
  - name: wails-pull
    description: "Pull repository bindings"
  - name: wails-fetch
    description: "Fetch repository bindings"
  - name: wails-account
    description: "Account CRUD bindings"
  - name: wails-credential
    description: "Credential setup, verification, and deletion bindings"
  - name: wails-identity
    description: "Global git identity management bindings"
  - name: wails-repo
    description: "Repository management (delete, discover, create) bindings"
  - name: wails-mirror
    description: "Mirror group and repo management bindings"

servers:
  - url: "https://api.github.com"
    description: "GitHub.com REST API (or {baseURL}/api/v3 for Enterprise)"
  - url: "{baseURL}/api/v4"
    description: "GitLab REST API v4"
    variables:
      baseURL:
        default: "https://gitlab.com"
  - url: "{baseURL}/api/v1"
    description: "Gitea/Forgejo REST API v1"
    variables:
      baseURL:
        default: "https://gitea.example.com"
  - url: "https://api.bitbucket.org/2.0"
    description: "Bitbucket Cloud REST API v2"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PATHS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
paths:

  # ════════════════════════════════════════════════════════════════
  # Section A -- GitHub REST v3
  # Auth: Authorization: Bearer <token>
  # Base: https://api.github.com (or <baseURL>/api/v3 for Enterprise)
  # ════════════════════════════════════════════════════════════════

  /user/repos:
    get:
      operationId: github_listUserRepos
      tags: [github]
      summary: "List authenticated user's repositories (paginated)"
      description: |
        Called by `GitHub.ListRepos()`. Fetches all repos visible to the
        authenticated user, 100 per page. Pagination continues until a
        batch returns fewer than 100 items.
      security:
        - githubBearer: []
      parameters:
        - name: per_page
          in: query
          required: true
          schema:
            type: integer
            enum: [100]
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [all]
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: "Array of repositories"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GitHubRepo"
        "401":
          description: "Bad or expired token"
        "403":
          description: "Insufficient scopes"

  /repos/{owner}/{repo}:
    get:
      operationId: github_getRepo
      tags: [github]
      summary: "Get repository info (default_branch, private)"
      description: |
        Called by `GitHub.GetRepoInfo()` and `GitHub.RepoExists()`.
        Returns 404 when used as an existence check.
      security:
        - githubBearer: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
      responses:
        "200":
          description: "Repository metadata"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubRepoDetail"
        "404":
          description: "Repository not found (used for existence check)"

  /repos/{owner}/{repo}/branches/{branch}:
    get:
      operationId: github_getBranch
      tags: [github]
      summary: "Get branch info (commit SHA, author date)"
      description: |
        Called by `GitHub.GetRepoInfo()` to read the HEAD commit SHA and
        author date on the default branch for mirror sync comparison.
      security:
        - githubBearer: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
        - name: branch
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Branch with commit details"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubBranch"
        "404":
          description: "Branch not found"

  /user/repos#create:
    post:
      operationId: github_createPersonalRepo
      tags: [github]
      summary: "Create a personal repository"
      description: |
        Called by `GitHub.CreateRepo()` when owner is empty (personal namespace).
      security:
        - githubBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubCreateRepoBody"
      responses:
        "201":
          description: "Repository created"
        "422":
          description: "Validation error (e.g. name already exists)"

  /orgs/{org}/repos:
    post:
      operationId: github_createOrgRepo
      tags: [github]
      summary: "Create a repository under an organization"
      description: |
        Called by `GitHub.CreateRepo()` when owner is non-empty.
      security:
        - githubBearer: []
      parameters:
        - name: org
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubCreateRepoBody"
      responses:
        "201":
          description: "Repository created"
        "404":
          description: "Organization not found"
        "422":
          description: "Validation error"

  /user/orgs:
    get:
      operationId: github_listUserOrgs
      tags: [github]
      summary: "List organizations for the authenticated user"
      description: |
        Called by `GitHub.ListUserOrgs()`. Returns up to 100 orgs.
        The `login` field is used as the org identifier.
      security:
        - githubBearer: []
      parameters:
        - name: per_page
          in: query
          required: true
          schema:
            type: integer
            enum: [100]
      responses:
        "200":
          description: "Array of organizations"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    login:
                      type: string
                      description: "Organization login name"

  # ════════════════════════════════════════════════════════════════
  # Section A -- GitLab REST v4
  # Auth: PRIVATE-TOKEN: <token>
  # Base: <baseURL>/api/v4
  # ════════════════════════════════════════════════════════════════

  /api/v4/projects:
    get:
      operationId: gitlab_listProjects
      tags: [gitlab]
      summary: "List projects the authenticated user is a member of (paginated)"
      description: |
        Called by `GitLab.ListRepos()`. Uses `membership=true` to list
        only projects the user belongs to. Pagination via `page` param
        and `X-Next-Page` response header. 100 items per page.
      security:
        - gitlabPrivateToken: []
      parameters:
        - name: membership
          in: query
          required: true
          schema:
            type: boolean
            enum: [true]
        - name: per_page
          in: query
          required: true
          schema:
            type: integer
            enum: [100]
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: "Array of projects"
          headers:
            X-Next-Page:
              description: "Next page number (empty on last page)"
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GitLabProject"
        "401":
          description: "Invalid or expired token"

  /api/v4/projects#create:
    post:
      operationId: gitlab_createProject
      tags: [gitlab]
      summary: "Create a new project"
      description: |
        Called by `GitLab.CreateRepo()`. If an owner (group) is specified,
        a namespace lookup is performed first and `namespace_id` is included.
      security:
        - gitlabPrivateToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitLabCreateProjectBody"
      responses:
        "201":
          description: "Project created"
        "400":
          description: "Validation error"

  /api/v4/projects/{encoded_path}:
    get:
      operationId: gitlab_getProject
      tags: [gitlab]
      summary: "Get project info by URL-encoded path (owner%2Frepo)"
      description: |
        Called by `GitLab.GetRepoInfo()`, `GitLab.RepoExists()`, and
        `GitLab.resolveProjectID()`. The path parameter is URL-encoded
        `owner/repo` (e.g., `user%2Fmy-repo`).
      security:
        - gitlabPrivateToken: []
      parameters:
        - name: encoded_path
          in: path
          required: true
          description: "URL-encoded owner/repo path (e.g. user%2Frepo)"
          schema:
            type: string
      responses:
        "200":
          description: "Project metadata"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitLabProjectDetail"
        "404":
          description: "Project not found"

  /api/v4/projects/{encoded_path}/repository/branches/{branch}:
    get:
      operationId: gitlab_getBranch
      tags: [gitlab]
      summary: "Get branch info (commit id, authored_date)"
      description: |
        Called by `GitLab.GetRepoInfo()` to read the HEAD commit on the
        default branch.
      security:
        - gitlabPrivateToken: []
      parameters:
        - name: encoded_path
          in: path
          required: true
          schema:
            type: string
        - name: branch
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Branch with commit details"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitLabBranch"
        "404":
          description: "Branch not found"

  /api/v4/namespaces:
    get:
      operationId: gitlab_searchNamespaces
      tags: [gitlab]
      summary: "Search namespaces to resolve namespace_id for project creation"
      description: |
        Called by `GitLab.CreateRepo()` when creating under a group.
        Matches on `full_path` (case-insensitive).
      security:
        - gitlabPrivateToken: []
      parameters:
        - name: search
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Array of matching namespaces"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      format: int64
                    full_path:
                      type: string

  /api/v4/groups:
    get:
      operationId: gitlab_listGroups
      tags: [gitlab]
      summary: "List groups where user has Developer+ access"
      description: |
        Called by `GitLab.ListUserOrgs()`. Uses `min_access_level=30`
        (Developer) to filter. Returns `full_path` as the group identifier.
      security:
        - gitlabPrivateToken: []
      parameters:
        - name: min_access_level
          in: query
          required: true
          schema:
            type: integer
            enum: [30]
        - name: per_page
          in: query
          required: true
          schema:
            type: integer
            enum: [100]
      responses:
        "200":
          description: "Array of groups"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    full_path:
                      type: string
                      description: "Group full path (e.g. my-group/subgroup)"

  /api/v4/projects/{id}/remote_mirrors:
    get:
      operationId: gitlab_listPushMirrors
      tags: [gitlab]
      summary: "List push mirrors for a project"
      description: |
        Called by `GitLab.ListPushMirrors()`. Requires the numeric project ID
        resolved via `resolveProjectID()`.
      security:
        - gitlabPrivateToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "Array of remote mirrors"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GitLabRemoteMirror"
    post:
      operationId: gitlab_createPushMirror
      tags: [gitlab]
      summary: "Create a push mirror for a project"
      description: |
        Called by `GitLab.CreatePushMirror()`. The URL includes the target
        token embedded as `token:<PAT>@host` for authentication. Sets
        `enabled: true` and `only_protected_branches: false`.
      security:
        - gitlabPrivateToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, enabled]
              properties:
                url:
                  type: string
                  description: "Target clone URL with embedded token"
                enabled:
                  type: boolean
                  default: true
                only_protected_branches:
                  type: boolean
                  default: false
      responses:
        "201":
          description: "Push mirror created"
        "400":
          description: "Invalid parameters"

  /api/v4/projects/{id}/remote_mirrors/{mirror_id}:
    delete:
      operationId: gitlab_deletePushMirror
      tags: [gitlab]
      summary: "Delete a push mirror"
      description: |
        Called by `GitLab.DeletePushMirror()`.
      security:
        - gitlabPrivateToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: mirror_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: "Mirror deleted"
        "404":
          description: "Mirror or project not found"

  # ════════════════════════════════════════════════════════════════
  # Section A -- Gitea/Forgejo REST v1
  # Auth: Authorization: token <PAT> (or Basic <base64(user:token)> fallback)
  # Base: <baseURL>/api/v1
  # ════════════════════════════════════════════════════════════════

  /api/v1/user/repos:
    get:
      operationId: gitea_listUserRepos
      tags: [gitea]
      summary: "List authenticated user's repositories (paginated)"
      description: |
        Called by `Gitea.ListRepos()`. 50 items per page. Also used by
        `Gitea.resolveAuth()` with `limit=1&page=1` to test auth method
        (PAT vs Basic fallback).
      security:
        - giteaPAT: []
        - giteaBasic: []
      parameters:
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            default: 50
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: "Array of repositories"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GiteaRepo"
        "401":
          description: "Invalid credentials"

  /api/v1/user/repos#create:
    post:
      operationId: gitea_createPersonalRepo
      tags: [gitea]
      summary: "Create a personal repository"
      description: |
        Called by `Gitea.CreateRepo()` when owner is empty.
      security:
        - giteaPAT: []
        - giteaBasic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GiteaCreateRepoBody"
      responses:
        "201":
          description: "Repository created"
        "409":
          description: "Repository already exists"
        "422":
          description: "Validation error"

  /api/v1/repos/{owner}/{repo}:
    get:
      operationId: gitea_getRepo
      tags: [gitea]
      summary: "Get repository info"
      description: |
        Called by `Gitea.GetRepoInfo()` and `Gitea.RepoExists()`.
        Returns 404 when used as an existence check.
      security:
        - giteaPAT: []
        - giteaBasic: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
      responses:
        "200":
          description: "Repository metadata"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiteaRepoDetail"
        "404":
          description: "Repository not found"

  /api/v1/repos/{owner}/{repo}/branches/{branch}:
    get:
      operationId: gitea_getBranch
      tags: [gitea]
      summary: "Get branch info (commit id, timestamp)"
      description: |
        Called by `Gitea.GetRepoInfo()` to read the HEAD commit on the
        default branch.
      security:
        - giteaPAT: []
        - giteaBasic: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
        - name: branch
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Branch with commit details"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiteaBranch"
        "404":
          description: "Branch not found"

  /api/v1/orgs/{org}/repos:
    post:
      operationId: gitea_createOrgRepo
      tags: [gitea]
      summary: "Create a repository under an organization"
      description: |
        Called by `Gitea.CreateRepo()` when owner is non-empty.
      security:
        - giteaPAT: []
        - giteaBasic: []
      parameters:
        - name: org
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GiteaCreateRepoBody"
      responses:
        "201":
          description: "Repository created"
        "404":
          description: "Organization not found"
        "409":
          description: "Repository already exists"

  /api/v1/user/orgs:
    get:
      operationId: gitea_listUserOrgs
      tags: [gitea]
      summary: "List organizations for the authenticated user"
      description: |
        Called by `Gitea.ListUserOrgs()`. Returns up to 50 orgs.
        The `username` field is used as the org identifier.
      security:
        - giteaPAT: []
        - giteaBasic: []
      parameters:
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            enum: [50]
      responses:
        "200":
          description: "Array of organizations"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    username:
                      type: string
                      description: "Organization username"

  /api/v1/repos/{owner}/{repo}/push_mirrors:
    get:
      operationId: gitea_listPushMirrors
      tags: [gitea]
      summary: "List push mirrors for a repository"
      description: |
        Called by `Gitea.ListPushMirrors()`.
      security:
        - giteaPAT: []
        - giteaBasic: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
      responses:
        "200":
          description: "Array of push mirrors"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GiteaPushMirror"
    post:
      operationId: gitea_createPushMirror
      tags: [gitea]
      summary: "Create a push mirror for a repository"
      description: |
        Called by `Gitea.CreatePushMirror()`. Sets interval to 8h and
        sync_on_commit to true. After creation, triggers an immediate
        sync via the push_mirrors-sync endpoint (best-effort).
      security:
        - giteaPAT: []
        - giteaBasic: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - remote_address
                - remote_username
                - remote_password
                - interval
                - sync_on_commit
              properties:
                remote_address:
                  type: string
                  description: "Target repository clone URL"
                remote_username:
                  type: string
                  description: "Always 'token' for PAT auth"
                  example: "token"
                remote_password:
                  type: string
                  description: "Target repository PAT"
                interval:
                  type: string
                  description: "Sync interval"
                  example: "8h"
                sync_on_commit:
                  type: boolean
                  default: true
      responses:
        "201":
          description: "Push mirror created"
        "400":
          description: "Invalid parameters"

  /api/v1/repos/{owner}/{repo}/push_mirrors/{id}:
    delete:
      operationId: gitea_deletePushMirror
      tags: [gitea]
      summary: "Delete a push mirror"
      description: |
        Called by `Gitea.DeletePushMirror()`.
      security:
        - giteaPAT: []
        - giteaBasic: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: "Push mirror deleted"
        "404":
          description: "Mirror or repository not found"

  /api/v1/repos/{owner}/{repo}/push_mirrors-sync:
    post:
      operationId: gitea_triggerPushSync
      tags: [gitea]
      summary: "Trigger immediate push mirror sync (best-effort)"
      description: |
        Called by `Gitea.CreatePushMirror()` right after mirror creation
        so the mirror does not wait for the first interval. Errors are
        silently ignored.
      security:
        - giteaPAT: []
        - giteaBasic: []
      parameters:
        - $ref: "#/components/parameters/owner"
        - $ref: "#/components/parameters/repo"
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: "Sync triggered"

  /api/v1/repos/migrate:
    post:
      operationId: gitea_createPullMirror
      tags: [gitea]
      summary: "Create a pull mirror via repository migration"
      description: |
        Called by `Gitea.CreatePullMirror()`. Creates a new repo that
        continuously pulls from an external source URL. Uses `mirror: true`
        and `service: git`.
      security:
        - giteaPAT: []
        - giteaBasic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - clone_addr
                - repo_name
                - mirror
              properties:
                clone_addr:
                  type: string
                  description: "Source repository clone URL"
                auth_token:
                  type: string
                  description: "Source repository PAT for authenticated access"
                repo_name:
                  type: string
                  description: "Name for the new mirror repository"
                mirror:
                  type: boolean
                  description: "Must be true for pull mirrors"
                  enum: [true]
                private:
                  type: boolean
                  description: "Whether the new repo should be private"
                service:
                  type: string
                  description: "Service type"
                  enum: [git]
      responses:
        "201":
          description: "Pull mirror repository created"
        "409":
          description: "Repository name already exists"

  # ════════════════════════════════════════════════════════════════
  # Section A -- Bitbucket Cloud REST v2
  # Auth: Authorization: Basic <base64(username:app_password)>
  # Base: https://api.bitbucket.org/2.0
  # ════════════════════════════════════════════════════════════════

  /repositories/{username}:
    get:
      operationId: bitbucket_listRepos
      tags: [bitbucket]
      summary: "List repositories for a user (paginated)"
      description: |
        Called by `Bitbucket.ListRepos()`. Uses cursor-based pagination
        via the `next` field in the response body. 100 items per page.
      security:
        - bitbucketBasic: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: pagelen
          in: query
          required: true
          schema:
            type: integer
            enum: [100]
      responses:
        "200":
          description: "Paginated repository list"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BitbucketRepoPage"
        "401":
          description: "Invalid credentials"

  /repositories/{workspace}/{repo_slug}:
    get:
      operationId: bitbucket_getRepo
      tags: [bitbucket]
      summary: "Check if a repository exists"
      description: |
        Called by `Bitbucket.RepoExists()`. Returns 404 if not found.
      security:
        - bitbucketBasic: []
      parameters:
        - name: workspace
          in: path
          required: true
          schema:
            type: string
        - name: repo_slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Repository exists"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BitbucketRepo"
        "404":
          description: "Repository not found"
    post:
      operationId: bitbucket_createRepo
      tags: [bitbucket]
      summary: "Create a repository"
      description: |
        Called by `Bitbucket.CreateRepo()`. Creates in the workspace
        (owner or personal username).
      security:
        - bitbucketBasic: []
      parameters:
        - name: workspace
          in: path
          required: true
          schema:
            type: string
        - name: repo_slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BitbucketCreateRepoBody"
      responses:
        "200":
          description: "Repository created"
        "400":
          description: "Validation error"

  /user/permissions/workspaces:
    get:
      operationId: bitbucket_listWorkspaces
      tags: [bitbucket]
      summary: "List workspaces the user has access to"
      description: |
        Called by `Bitbucket.ListUserOrgs()`. Filters out the user's own
        username from the results (returns only non-personal workspaces).
      security:
        - bitbucketBasic: []
      parameters:
        - name: pagelen
          in: query
          required: true
          schema:
            type: integer
            enum: [100]
      responses:
        "200":
          description: "Paginated workspace permissions"
          content:
            application/json:
              schema:
                type: object
                properties:
                  values:
                    type: array
                    items:
                      type: object
                      properties:
                        workspace:
                          type: object
                          properties:
                            slug:
                              type: string
                              description: "Workspace slug"

  # ════════════════════════════════════════════════════════════════
  # Section B -- Wails Bindings
  # All paths are synthetic /wails/{Method} POST endpoints
  # with x-wails-binding: true
  # ════════════════════════════════════════════════════════════════

  # ──── Lifecycle ─────────────────────────────────────────────────

  /wails/GetAppVersion:
    post:
      operationId: wails_GetAppVersion
      tags: [wails-lifecycle]
      summary: "Returns the application version string"
      description: |
        Returns a formatted version string. CI builds: "v1.0.6 (abc1234)".
        Local builds: auto-detected from `git describe`.
      x-wails-binding: true
      responses:
        "200":
          description: "Version string"
          content:
            application/json:
              schema:
                type: string

  /wails/IsFirstRun:
    post:
      operationId: wails_IsFirstRun
      tags: [wails-lifecycle]
      summary: "Returns true if no global folder is configured"
      x-wails-binding: true
      responses:
        "200":
          description: "First-run flag"
          content:
            application/json:
              schema:
                type: boolean

  /wails/GetConfigLoadError:
    post:
      operationId: wails_GetConfigLoadError
      tags: [wails-lifecycle]
      summary: "Returns config parse error string (empty if OK)"
      description: |
        Non-empty when the config file existed on disk but failed to parse.
        The frontend should display this and offer to reinitialize.
      x-wails-binding: true
      responses:
        "200":
          description: "Error message or empty string"
          content:
            application/json:
              schema:
                type: string

  /wails/ShowWindow:
    post:
      operationId: wails_ShowWindow
      tags: [wails-lifecycle]
      summary: "Makes the window visible"
      description: |
        Called by the frontend after compact mode layout is measured and
        the window is correctly sized, to avoid flickering during resize.
      x-wails-binding: true
      responses:
        "200":
          description: "Window shown (void)"

  # ──── Config ────────────────────────────────────────────────────

  /wails/GetConfig:
    post:
      operationId: wails_GetConfig
      tags: [wails-config]
      summary: "Returns the full configuration as a ConfigDTO"
      x-wails-binding: true
      responses:
        "200":
          description: "Configuration data"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigDTO"

  /wails/ReloadConfig:
    post:
      operationId: wails_ReloadConfig
      tags: [wails-config]
      summary: "Re-reads config from disk and returns updated ConfigDTO"
      description: |
        Call after external edits or when the window regains focus.
      x-wails-binding: true
      responses:
        "200":
          description: "Reloaded configuration"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigDTO"
        "500":
          description: "Reload error"

  /wails/GetConfigPath:
    post:
      operationId: wails_GetConfigPath
      tags: [wails-config]
      summary: "Returns the absolute path to the config file"
      x-wails-binding: true
      responses:
        "200":
          description: "Config file path"
          content:
            application/json:
              schema:
                type: string

  /wails/GetGlobalFolder:
    post:
      operationId: wails_GetGlobalFolder
      tags: [wails-config]
      summary: "Returns the expanded clone base folder"
      x-wails-binding: true
      responses:
        "200":
          description: "Expanded folder path"
          content:
            application/json:
              schema:
                type: string

  /wails/OpenFileInEditor:
    post:
      operationId: wails_OpenFileInEditor
      tags: [wails-config]
      summary: "Opens a file with the OS default application"
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  description: "Absolute file path to open"
      responses:
        "200":
          description: "File opened (void)"
        "500":
          description: "Failed to open file"

  # ──── Settings ──────────────────────────────────────────────────

  /wails/SetGlobalFolder:
    post:
      operationId: wails_SetGlobalFolder
      tags: [wails-settings]
      summary: "Sets the global clone folder and saves config"
      description: |
        Validates the path, creates the directory if needed, and persists
        it to the config file. Marks onboarding as complete.
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [folder]
              properties:
                folder:
                  type: string
      responses:
        "200":
          description: "Folder set (void)"
        "500":
          description: "Validation or I/O error"

  /wails/PickFolder:
    post:
      operationId: wails_PickFolder
      tags: [wails-settings]
      summary: "Opens native OS directory picker"
      description: "Returns the selected path or empty string if cancelled."
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  description: "Dialog title"
      responses:
        "200":
          description: "Selected directory path or empty string"
          content:
            application/json:
              schema:
                type: string

  /wails/GetPeriodicSync:
    post:
      operationId: wails_GetPeriodicSync
      tags: [wails-settings]
      summary: "Returns the current periodic sync interval"
      x-wails-binding: true
      responses:
        "200":
          description: "Interval string"
          content:
            application/json:
              schema:
                type: string
                enum: ["off", "5m", "15m", "30m"]

  /wails/SetPeriodicSync:
    post:
      operationId: wails_SetPeriodicSync
      tags: [wails-settings]
      summary: "Saves the periodic sync interval to config"
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [interval]
              properties:
                interval:
                  type: string
                  enum: ["off", "5m", "15m", "30m"]
      responses:
        "200":
          description: "Interval saved (void)"
        "500":
          description: "Invalid interval"

  /wails/GetViewMode:
    post:
      operationId: wails_GetViewMode
      tags: [wails-settings]
      summary: "Returns the persisted view mode"
      x-wails-binding: true
      responses:
        "200":
          description: "View mode"
          content:
            application/json:
              schema:
                type: string
                enum: ["full", "compact"]

  /wails/SetViewMode:
    post:
      operationId: wails_SetViewMode
      tags: [wails-settings]
      summary: "Saves view mode and swaps window position/size slots"
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: ["full", "compact"]
      responses:
        "200":
          description: "Mode saved (void)"

  /wails/GetAutostart:
    post:
      operationId: wails_GetAutostart
      tags: [wails-settings]
      summary: "Returns whether the app runs at OS login"
      x-wails-binding: true
      responses:
        "200":
          description: "Autostart enabled flag"
          content:
            application/json:
              schema:
                type: boolean

  /wails/SetAutostart:
    post:
      operationId: wails_SetAutostart
      tags: [wails-settings]
      summary: "Enables or disables run-at-login"
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enable]
              properties:
                enable:
                  type: boolean
      responses:
        "200":
          description: "Autostart toggled (void)"

  # ──── Status ────────────────────────────────────────────────────

  /wails/GetAllStatus:
    post:
      operationId: wails_GetAllStatus
      tags: [wails-status]
      summary: "Returns sync status of every configured repo"
      x-wails-binding: true
      responses:
        "200":
          description: "Array of status results"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusResult"

  /wails/RefreshStatus:
    post:
      operationId: wails_RefreshStatus
      tags: [wails-status]
      summary: "Checks all repos and emits status:updated event"
      description: |
        Runs asynchronously. Emits `status:updated` Wails event with
        the full StatusResult array when complete.
      x-wails-binding: true
      x-wails-events:
        - name: "status:updated"
          payload: "StatusResult[]"
      responses:
        "200":
          description: "Refresh started (void)"

  # ──── Clone ─────────────────────────────────────────────────────

  /wails/CloneRepo:
    post:
      operationId: wails_CloneRepo
      tags: [wails-clone]
      summary: "Clones a single repo asynchronously"
      description: |
        Emits `clone:progress` events during download and `clone:done`
        when complete. After cloning, sets per-repo identity and
        configures credential isolation.
      x-wails-binding: true
      x-wails-events:
        - name: "clone:progress"
          payload: "{source, repo, phase, percent}"
        - name: "clone:done"
          payload: "{source, repo, error?}"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceKey, repoKey]
              properties:
                sourceKey:
                  type: string
                repoKey:
                  type: string
      responses:
        "200":
          description: "Clone started (void)"

  # ──── Pull ──────────────────────────────────────────────────────

  /wails/PullRepo:
    post:
      operationId: wails_PullRepo
      tags: [wails-pull]
      summary: "Pulls a single repo asynchronously"
      description: |
        Runs `git pull --quiet` on the repo. Emits `pull:done` event.
      x-wails-binding: true
      x-wails-events:
        - name: "pull:done"
          payload: "{source, repo, error?}"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceKey, repoKey]
              properties:
                sourceKey:
                  type: string
                repoKey:
                  type: string
      responses:
        "200":
          description: "Pull started (void)"

  # ──── Fetch ─────────────────────────────────────────────────────

  /wails/FetchRepo:
    post:
      operationId: wails_FetchRepo
      tags: [wails-fetch]
      summary: "Runs git fetch on a single repo"
      description: |
        After fetch, verifies per-repo identity and emits `fetch:done`.
        Then calls `RefreshStatus()` to update the UI.
      x-wails-binding: true
      x-wails-events:
        - name: "fetch:done"
          payload: "{source, repo, error?}"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceKey, repoKey]
              properties:
                sourceKey:
                  type: string
                repoKey:
                  type: string
      responses:
        "200":
          description: "Fetch started (void)"

  /wails/FetchAllRepos:
    post:
      operationId: wails_FetchAllRepos
      tags: [wails-fetch]
      summary: "Runs git fetch on every cloned repo"
      description: |
        Iterates all configured repos. For each cloned repo, emits
        `fetch:start` before and `fetch:done` after. Emits
        `fetch:alldone` when all complete, then calls `RefreshStatus()`.
      x-wails-binding: true
      x-wails-events:
        - name: "fetch:start"
          payload: "{source, repo}"
        - name: "fetch:done"
          payload: "{source, repo}"
        - name: "fetch:alldone"
          payload: "null"
      responses:
        "200":
          description: "Fetch-all started (void)"

  /wails/GetRepoDetail:
    post:
      operationId: wails_GetRepoDetail
      tags: [wails-fetch]
      summary: "Returns detailed file-level status for a repo"
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceKey, repoKey]
              properties:
                sourceKey:
                  type: string
                repoKey:
                  type: string
      responses:
        "200":
          description: "Detailed repo status"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoDetail"

  # ──── Account ───────────────────────────────────────────────────

  /wails/AddAccount:
    post:
      operationId: wails_AddAccount
      tags: [wails-account]
      summary: "Creates a new account and matching source"
      description: |
        Populates credential sub-objects (GCM/SSH/Token) based on the
        credential type. Also creates a matching source so repos can be
        added immediately.
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddAccountRequest"
      responses:
        "200":
          description: "Account created (void)"
        "500":
          description: "Duplicate key or save error"

  /wails/UpdateAccount:
    post:
      operationId: wails_UpdateAccount
      tags: [wails-account]
      summary: "Updates editable fields of an existing account"
      description: |
        After saving, updates `user.name` and `user.email` in all
        cloned repos belonging to this account.
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          description: "Account updated (void)"
        "500":
          description: "Account not found or save error"

  /wails/RenameAccount:
    post:
      operationId: wails_RenameAccount
      tags: [wails-account]
      summary: "Renames an account key and migrates all artifacts"
      description: |
        Migrates: config references, source key and folder, OS keyring
        tokens, SSH keys and config entries. Validates the new key format.
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldKey, newKey]
              properties:
                oldKey:
                  type: string
                newKey:
                  type: string
                  pattern: "^[a-zA-Z0-9][a-zA-Z0-9-]*$"
      responses:
        "200":
          description: "Account renamed (void)"
        "500":
          description: "Account not found, duplicate key, or invalid format"

  /wails/DeleteAccount:
    post:
      operationId: wails_DeleteAccount
      tags: [wails-account]
      summary: "Deletes an account, its sources, and all local clones"
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountKey]
              properties:
                accountKey:
                  type: string
      responses:
        "200":
          description: "Account deleted (void)"
        "500":
          description: "Account not found"

  /wails/ListAccountOrgs:
    post:
      operationId: wails_ListAccountOrgs
      tags: [wails-account]
      summary: "Returns organizations/namespaces for an account"
      description: |
        The first entry is always the personal username. Remaining entries
        are orgs/groups/workspaces from the provider API.
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountKey]
              properties:
                accountKey:
                  type: string
      responses:
        "200":
          description: "Array of org/namespace names"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # ──── Credential ────────────────────────────────────────────────

  /wails/CredentialSetupGCM:
    post:
      operationId: wails_CredentialSetupGCM
      tags: [wails-credential]
      summary: "Triggers GCM browser authentication for an account"
      description: |
        Runs `git credential fill` (interactive -- GCM opens browser),
        then `git credential approve` to persist. Reconfigures existing
        clones afterward.
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountKey]
              properties:
                accountKey:
                  type: string
      responses:
        "200":
          description: "Credential setup result"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialSetupResult"

  /wails/CredentialStoreToken:
    post:
      operationId: wails_CredentialStoreToken
      tags: [wails-credential]
      summary: "Stores a PAT in the OS keyring"
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountKey, token]
              properties:
                accountKey:
                  type: string
                token:
                  type: string
      responses:
        "200":
          description: "Credential setup result"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialSetupResult"

  /wails/CredentialSetupSSH:
    post:
      operationId: wails_CredentialSetupSSH
      tags: [wails-credential]
      summary: "Generates SSH key and configures ~/.ssh/config"
      description: |
        Creates the SSH key pair, writes the ~/.ssh/config entry, updates
        the account config, tests the SSH connection, and reconfigures
        existing clones.
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountKey]
              properties:
                accountKey:
                  type: string
      responses:
        "200":
          description: "SSH setup result with public key and provider URL"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialSetupResult"

  /wails/CredentialRegenerateSSH:
    post:
      operationId: wails_CredentialRegenerateSSH
      tags: [wails-credential]
      summary: "Deletes existing SSH key and regenerates from scratch"
      description: |
        Removes old key files and SSH config entry, then runs
        `CredentialSetupSSH` to create fresh ones.
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountKey]
              properties:
                accountKey:
                  type: string
      responses:
        "200":
          description: "SSH regeneration result"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialSetupResult"

  /wails/CredentialVerify:
    post:
      operationId: wails_CredentialVerify
      tags: [wails-credential]
      summary: "Verifies credentials are working for an account"
      description: |
        SSH accounts: tests SSH connection. GCM/Token accounts: makes a
        test API call via provider.TestAuth.
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountKey]
              properties:
                accountKey:
                  type: string
      responses:
        "200":
          description: "Verification result"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialStatus"

  /wails/CredentialDelete:
    post:
      operationId: wails_CredentialDelete
      tags: [wails-credential]
      summary: "Removes credential artifacts and clears config"
      description: |
        Removes OS-level artifacts (keyring entries, SSH keys, GCM
        cached credentials) and clears the credential type in config
        so it can be set up from scratch.
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountKey]
              properties:
                accountKey:
                  type: string
      responses:
        "200":
          description: "Deletion result"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialSetupResult"

  /wails/GetTokenGuide:
    post:
      operationId: wails_GetTokenGuide
      tags: [wails-credential]
      summary: "Returns provider-specific PAT creation info"
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountKey]
              properties:
                accountKey:
                  type: string
      responses:
        "200":
          description: "Token guide info"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenGuideInfo"

  /wails/ChangeCredentialType:
    post:
      operationId: wails_ChangeCredentialType
      tags: [wails-credential]
      summary: "Changes an account's credential type"
      description: |
        Cleans up old credential artifacts, updates the account config
        with the new credential type and sub-objects, and reconfigures
        all existing clones.
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountKey, newType]
              properties:
                accountKey:
                  type: string
                newType:
                  type: string
                  enum: ["gcm", "ssh", "token"]
      responses:
        "200":
          description: "Credential type changed (void)"
        "500":
          description: "Account not found or save error"

  /wails/CheckMirrorCredentials:
    post:
      operationId: wails_CheckMirrorCredentials
      tags: [wails-credential]
      summary: "Checks if an account has a portable PAT for mirrors"
      description: |
        GCM OAuth tokens are not portable to remote mirror servers.
        This checks whether a separate PAT is available.
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountKey]
              properties:
                accountKey:
                  type: string
      responses:
        "200":
          description: "Mirror credential check result"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MirrorCredentialCheck"

  # ──── Identity ──────────────────────────────────────────────────

  /wails/CheckGlobalIdentity:
    post:
      operationId: wails_CheckGlobalIdentity
      tags: [wails-identity]
      summary: "Returns whether ~/.gitconfig has user.name/user.email"
      x-wails-binding: true
      responses:
        "200":
          description: "Global identity status"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalIdentityStatus"

  /wails/RemoveGlobalIdentity:
    post:
      operationId: wails_RemoveGlobalIdentity
      tags: [wails-identity]
      summary: "Removes user.name and user.email from ~/.gitconfig"
      x-wails-binding: true
      responses:
        "200":
          description: "Identity removed (void)"
        "500":
          description: "Failed to remove"

  # ──── Repo ──────────────────────────────────────────────────────

  /wails/DeleteRepo:
    post:
      operationId: wails_DeleteRepo
      tags: [wails-repo]
      summary: "Removes a repo from config and deletes its local folder"
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceKey, repoKey]
              properties:
                sourceKey:
                  type: string
                repoKey:
                  type: string
      responses:
        "200":
          description: "Repo deleted (void)"
        "500":
          description: "Source or repo not found"

  /wails/Discover:
    post:
      operationId: wails_Discover
      tags: [wails-repo]
      summary: "Lists remote repos for an account (async)"
      description: |
        Resolves API token, calls provider.ListRepos, and emits
        `discover:done` event with the results.
      x-wails-binding: true
      x-wails-events:
        - name: "discover:done"
          payload: "{accountKey, repos?: DiscoverResult[], error?}"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountKey]
              properties:
                accountKey:
                  type: string
      responses:
        "200":
          description: "Discovery started (void)"

  /wails/AddDiscoveredRepos:
    post:
      operationId: wails_AddDiscoveredRepos
      tags: [wails-repo]
      summary: "Adds discovered repos to config and saves"
      description: |
        The key can be either a source key or an account key. If it is an
        account key, the first source referencing that account is used.
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceKey, repos]
              properties:
                sourceKey:
                  type: string
                  description: "Source key or account key"
                repos:
                  type: array
                  items:
                    type: string
                  description: "Array of repo full names (org/repo)"
      responses:
        "200":
          description: "Repos added (void)"
        "500":
          description: "No matching source or save error"

  /wails/ListRemoteRepos:
    post:
      operationId: wails_ListRemoteRepos
      tags: [wails-repo]
      summary: "Returns the repo list for an account (synchronous)"
      description: |
        Used in mirror repo pickers. Resolves API token and calls
        provider.ListRepos with a 30s timeout.
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountKey]
              properties:
                accountKey:
                  type: string
      responses:
        "200":
          description: "Array of remote repos (or null on error)"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiscoverResult"
                nullable: true

  /wails/CreateNewRepo:
    post:
      operationId: wails_CreateNewRepo
      tags: [wails-repo]
      summary: "Creates a repository on the provider and optionally clones it"
      description: |
        Creates via provider API. If `cloneAfter` is true, adds to config
        and triggers `CloneRepo` (emits `clone:progress`/`clone:done`).
      x-wails-binding: true
      x-wails-events:
        - name: "clone:progress"
          payload: "{source, repo, phase, percent}"
          condition: "Only when cloneAfter=true"
        - name: "clone:done"
          payload: "{source, repo, error?}"
          condition: "Only when cloneAfter=true"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - accountKey
                - owner
                - repoName
                - description
                - isPrivate
                - cloneAfter
              properties:
                accountKey:
                  type: string
                owner:
                  type: string
                  description: "Org/group name or personal username"
                repoName:
                  type: string
                description:
                  type: string
                isPrivate:
                  type: boolean
                cloneAfter:
                  type: boolean
      responses:
        "200":
          description: "Repo created (void)"
        "500":
          description: "Provider error or save error"

  # ──── Mirror ────────────────────────────────────────────────────

  /wails/GetMirrorStatus:
    post:
      operationId: wails_GetMirrorStatus
      tags: [wails-mirror]
      summary: "Checks live sync status for all repos in a mirror group"
      description: |
        Runs async with a 60s timeout. Emits `mirror:status` event with
        an array of MirrorStatusResult objects.
      x-wails-binding: true
      x-wails-events:
        - name: "mirror:status"
          payload: "MirrorStatusResult[]"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mirrorKey]
              properties:
                mirrorKey:
                  type: string
      responses:
        "200":
          description: "Status check started (void)"

  /wails/SetupMirrorRepo:
    post:
      operationId: wails_SetupMirrorRepo
      tags: [wails-mirror]
      summary: "Runs API setup for a single mirror repo"
      description: |
        Runs async with a 60s timeout. Creates the target repo if needed
        and configures the mirror via provider API. Emits
        `mirror:setup:done` event. Updates config status on success.
      x-wails-binding: true
      x-wails-events:
        - name: "mirror:setup:done"
          payload: "MirrorSetupResult"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mirrorKey, repoKey]
              properties:
                mirrorKey:
                  type: string
                repoKey:
                  type: string
      responses:
        "200":
          description: "Setup started (void)"

  /wails/AddMirrorGroup:
    post:
      operationId: wails_AddMirrorGroup
      tags: [wails-mirror]
      summary: "Creates a new mirror group pairing two accounts"
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, accountSrc, accountDst]
              properties:
                key:
                  type: string
                accountSrc:
                  type: string
                accountDst:
                  type: string
      responses:
        "200":
          description: "Mirror group created (void)"
        "500":
          description: "Duplicate key or save error"

  /wails/DeleteMirrorGroup:
    post:
      operationId: wails_DeleteMirrorGroup
      tags: [wails-mirror]
      summary: "Removes a mirror group and all its repos"
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
      responses:
        "200":
          description: "Mirror group deleted (void)"
        "500":
          description: "Group not found"

  /wails/AddMirrorRepo:
    post:
      operationId: wails_AddMirrorRepo
      tags: [wails-mirror]
      summary: "Adds a repo to a mirror group"
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mirrorKey, repoKey, direction, origin]
              properties:
                mirrorKey:
                  type: string
                repoKey:
                  type: string
                  description: "Repo full name on the origin side (e.g. org/repo)"
                direction:
                  type: string
                  enum: ["push", "pull"]
                origin:
                  type: string
                  enum: ["src", "dst"]
                  description: "Which account owns the source of truth"
      responses:
        "200":
          description: "Mirror repo added (void)"
        "500":
          description: "Mirror group not found or save error"

  /wails/DeleteMirrorRepo:
    post:
      operationId: wails_DeleteMirrorRepo
      tags: [wails-mirror]
      summary: "Removes a repo from a mirror group"
      x-wails-binding: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mirrorKey, repoKey]
              properties:
                mirrorKey:
                  type: string
                repoKey:
                  type: string
      responses:
        "200":
          description: "Mirror repo removed (void)"
        "500":
          description: "Mirror group or repo not found"

  /wails/DiscoverMirrors:
    post:
      operationId: wails_DiscoverMirrors
      tags: [wails-mirror]
      summary: "Scans all account pairs to detect mirror relationships"
      description: |
        Runs async with a 120s timeout. Emits `mirror:discover:progress`
        events during scanning and `mirror:discover:done` when complete.
        Uses three detection methods: push mirror API, mirror flag, and
        name matching.
      x-wails-binding: true
      x-wails-events:
        - name: "mirror:discover:progress"
          payload: "{phase, account, current, total}"
        - name: "mirror:discover:done"
          payload: "{results?: DiscoveryResult[], error?}"
      responses:
        "200":
          description: "Discovery started (void)"

  /wails/ApplyDiscoveredMirrors:
    post:
      operationId: wails_ApplyDiscoveredMirrors
      tags: [wails-mirror]
      summary: "Merges discovered mirrors into the config"
      description: |
        Re-runs discovery (120s timeout) and applies results to config.
        Saves only if new mirrors were added.
      x-wails-binding: true
      responses:
        "200":
          description: "Mirrors applied (void)"
        "500":
          description: "Discovery or save error"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# COMPONENTS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
components:

  # ────────────────────────────────────────────────────────────────
  # Security Schemes
  # ────────────────────────────────────────────────────────────────
  securitySchemes:
    githubBearer:
      type: http
      scheme: bearer
      description: "GitHub: Authorization: Bearer <token>"
    gitlabPrivateToken:
      type: apiKey
      in: header
      name: PRIVATE-TOKEN
      description: "GitLab: PRIVATE-TOKEN: <token>"
    giteaPAT:
      type: apiKey
      in: header
      name: Authorization
      description: "Gitea/Forgejo: Authorization: token <PAT>"
    giteaBasic:
      type: http
      scheme: basic
      description: "Gitea/Forgejo fallback: Authorization: Basic <base64(user:token)>"
    bitbucketBasic:
      type: http
      scheme: basic
      description: "Bitbucket: Authorization: Basic <base64(username:app_password)>"

  # ────────────────────────────────────────────────────────────────
  # Parameters
  # ────────────────────────────────────────────────────────────────
  parameters:
    owner:
      name: owner
      in: path
      required: true
      schema:
        type: string
      description: "Repository owner (user or org)"
    repo:
      name: repo
      in: path
      required: true
      schema:
        type: string
      description: "Repository name"

  # ────────────────────────────────────────────────────────────────
  # Schemas
  # ────────────────────────────────────────────────────────────────
  schemas:

    # ══════════════════════════════════════════════════════════════
    # Provider API response schemas
    # ══════════════════════════════════════════════════════════════

    # --- GitHub ---

    GitHubRepo:
      type: object
      description: "GitHub repository (list response item)"
      properties:
        full_name:
          type: string
          example: "octocat/hello-world"
        description:
          type: string
          nullable: true
        clone_url:
          type: string
          format: uri
        ssh_url:
          type: string
        private:
          type: boolean
        fork:
          type: boolean
        archived:
          type: boolean

    GitHubRepoDetail:
      type: object
      description: "GitHub repository detail (includes default_branch)"
      properties:
        full_name:
          type: string
        description:
          type: string
          nullable: true
        clone_url:
          type: string
          format: uri
        ssh_url:
          type: string
        private:
          type: boolean
        fork:
          type: boolean
        archived:
          type: boolean
        default_branch:
          type: string
          example: "main"

    GitHubBranch:
      type: object
      description: "GitHub branch response"
      properties:
        commit:
          type: object
          properties:
            sha:
              type: string
              description: "Commit SHA"
            commit:
              type: object
              properties:
                author:
                  type: object
                  properties:
                    date:
                      type: string
                      format: date-time
                      description: "ISO 8601 author date"

    GitHubCreateRepoBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        private:
          type: boolean

    # --- GitLab ---

    GitLabProject:
      type: object
      description: "GitLab project (list response item)"
      properties:
        path_with_namespace:
          type: string
          example: "group/my-project"
        description:
          type: string
          nullable: true
        http_url_to_repo:
          type: string
          format: uri
        ssh_url_to_repo:
          type: string
        visibility:
          type: string
          enum: ["public", "internal", "private"]
        archived:
          type: boolean
        forked_from_project:
          type: object
          nullable: true
          properties:
            id:
              type: integer

    GitLabProjectDetail:
      type: object
      description: "GitLab project detail (includes ID and default_branch)"
      properties:
        id:
          type: integer
          format: int64
        path_with_namespace:
          type: string
        default_branch:
          type: string
        visibility:
          type: string
          enum: ["public", "internal", "private"]

    GitLabBranch:
      type: object
      description: "GitLab branch response"
      properties:
        commit:
          type: object
          properties:
            id:
              type: string
              description: "Commit SHA"
            authored_date:
              type: string
              format: date-time
              description: "ISO 8601 authored date"

    GitLabCreateProjectBody:
      type: object
      required: [name, visibility]
      properties:
        name:
          type: string
        description:
          type: string
        visibility:
          type: string
          enum: ["public", "internal", "private"]
        namespace_id:
          type: integer
          format: int64
          description: "Group/namespace ID (omitted for personal projects)"

    GitLabRemoteMirror:
      type: object
      description: "GitLab remote mirror (push mirror)"
      properties:
        id:
          type: integer
          format: int64
        url:
          type: string
          description: "Remote mirror URL"
        enabled:
          type: boolean

    # --- Gitea/Forgejo ---

    GiteaRepo:
      type: object
      description: "Gitea/Forgejo repository (list response item)"
      properties:
        full_name:
          type: string
          example: "user/my-repo"
        description:
          type: string
          nullable: true
        clone_url:
          type: string
          format: uri
        ssh_url:
          type: string
        private:
          type: boolean
        fork:
          type: boolean
        archived:
          type: boolean
        mirror:
          type: boolean
          description: "True if the repo is a pull mirror"

    GiteaRepoDetail:
      type: object
      description: "Gitea/Forgejo repository detail"
      properties:
        full_name:
          type: string
        default_branch:
          type: string
        private:
          type: boolean

    GiteaBranch:
      type: object
      description: "Gitea/Forgejo branch response"
      properties:
        commit:
          type: object
          properties:
            id:
              type: string
              description: "Commit SHA"
            timestamp:
              type: string
              format: date-time
              description: "ISO 8601 commit timestamp"

    GiteaCreateRepoBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        private:
          type: boolean

    GiteaPushMirror:
      type: object
      description: "Gitea/Forgejo push mirror"
      properties:
        id:
          type: integer
          format: int64
        remote_address:
          type: string
          description: "Target remote URL"
        interval:
          type: string
          description: "Sync interval (e.g. 8h)"
        sync_on_commit:
          type: boolean

    # --- Bitbucket ---

    BitbucketRepo:
      type: object
      description: "Bitbucket repository"
      properties:
        full_name:
          type: string
          example: "workspace/my-repo"
        description:
          type: string
          nullable: true
        is_private:
          type: boolean
        links:
          type: object
          properties:
            clone:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                    enum: ["https", "ssh"]
                  href:
                    type: string
                    format: uri
        parent:
          type: object
          nullable: true
          description: "Non-null if the repo is a fork"
          properties:
            full_name:
              type: string

    BitbucketRepoPage:
      type: object
      description: "Bitbucket paginated repository response"
      properties:
        values:
          type: array
          items:
            $ref: "#/components/schemas/BitbucketRepo"
        next:
          type: string
          format: uri
          nullable: true
          description: "URL for next page (null on last page)"

    BitbucketCreateRepoBody:
      type: object
      required: [scm, name]
      properties:
        scm:
          type: string
          enum: [git]
        name:
          type: string
        description:
          type: string
        is_private:
          type: boolean

    # ══════════════════════════════════════════════════════════════
    # Shared provider types (normalized Go structs)
    # ══════════════════════════════════════════════════════════════

    RemoteRepo:
      type: object
      description: "Normalized repo representation returned by any provider (provider.RemoteRepo)"
      properties:
        full_name:
          type: string
          description: "org/repo format"
        description:
          type: string
        clone_https:
          type: string
          format: uri
        clone_ssh:
          type: string
        private:
          type: boolean
        fork:
          type: boolean
        archived:
          type: boolean
        mirror:
          type: boolean

    RepoInfo:
      type: object
      description: "Basic repository metadata for sync comparison (provider.RepoInfo)"
      properties:
        default_branch:
          type: string
        head_commit:
          type: string
          description: "SHA of latest commit on default branch"
        commit_time:
          type: integer
          format: int64
          description: "Unix timestamp of HEAD commit (0 if unknown)"
        private:
          type: boolean

    PushMirrorInfo:
      type: object
      description: "Server-side push mirror descriptor (provider.PushMirrorInfo)"
      properties:
        id:
          type: integer
          format: int64
        remote_url:
          type: string
        interval:
          type: string
        sync_on_commit:
          type: boolean

    # ══════════════════════════════════════════════════════════════
    # Config model schemas (pkg/config)
    # ══════════════════════════════════════════════════════════════

    Config:
      type: object
      description: "Top-level gitbox configuration (v2 format, config.Config)"
      required: [version, global, accounts, sources]
      properties:
        "$schema":
          type: string
        version:
          type: integer
          enum: [2]
        global:
          $ref: "#/components/schemas/GlobalConfig"
        accounts:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Account"
        sources:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Source"
        mirrors:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Mirror"

    GlobalConfig:
      type: object
      description: "Global settings (config.GlobalConfig)"
      required: [folder]
      properties:
        folder:
          type: string
          description: "Base clone folder (may contain ~)"
        periodic_sync:
          type: string
          enum: ["", "5m", "15m", "30m"]
        window:
          $ref: "#/components/schemas/WindowState"
        compact_window:
          $ref: "#/components/schemas/WindowState"
        view_mode:
          type: string
          enum: ["", "full", "compact"]
        credential_ssh:
          $ref: "#/components/schemas/SSHGlobal"
        credential_gcm:
          $ref: "#/components/schemas/GCMGlobal"
        credential_token:
          $ref: "#/components/schemas/TokenGlobal"

    WindowState:
      type: object
      description: "Window position and size for session persistence"
      properties:
        x:
          type: integer
        y:
          type: integer
        width:
          type: integer
        height:
          type: integer

    SSHGlobal:
      type: object
      description: "Global SSH credential settings"
      properties:
        ssh_folder:
          type: string

    GCMGlobal:
      type: object
      description: "Global Git Credential Manager settings"
      properties:
        helper:
          type: string
        credential_store:
          type: string

    TokenGlobal:
      type: object
      description: "Global token/PAT credential settings (presence marker)"

    Account:
      type: object
      description: "Git provider account (config.Account)"
      required: [provider, url, username]
      properties:
        provider:
          type: string
          enum: ["github", "gitlab", "gitea", "forgejo", "bitbucket"]
        url:
          type: string
          format: uri
        username:
          type: string
        name:
          type: string
          description: "Git user.name"
        email:
          type: string
          format: email
          description: "Git user.email"
        default_credential_type:
          type: string
          enum: ["gcm", "ssh", "token", ""]
        ssh:
          $ref: "#/components/schemas/SSHConfig"
        gcm:
          $ref: "#/components/schemas/GCMConfig"

    SSHConfig:
      type: object
      description: "Per-account SSH authentication settings"
      properties:
        host:
          type: string
          description: "SSH config Host alias (e.g. gitbox-myaccount)"
        hostname:
          type: string
          description: "Actual SSH hostname"
        key_type:
          type: string
          enum: ["ed25519", "rsa"]

    GCMConfig:
      type: object
      description: "Per-account Git Credential Manager settings"
      properties:
        provider:
          type: string
          enum: ["github", "gitlab", "bitbucket", "generic"]
        useHttpPath:
          type: boolean

    Source:
      type: object
      description: "Clone source referencing an account (config.Source)"
      required: [account, repos]
      properties:
        account:
          type: string
          description: "Account key reference"
        folder:
          type: string
          description: "Override for first-level clone folder"
        repos:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Repo"

    Repo:
      type: object
      description: "Single repository configuration (config.Repo)"
      properties:
        credential_type:
          type: string
          enum: ["gcm", "ssh", "token", ""]
          description: "Per-repo override (inherits from account if empty)"
        name:
          type: string
          description: "Per-repo user.name override"
        email:
          type: string
          description: "Per-repo user.email override"
        id_folder:
          type: string
          description: "Overrides 2nd level dir (org part)"
        clone_folder:
          type: string
          description: "Overrides 3rd level dir (clone name). Absolute paths replace entire path."

    Mirror:
      type: object
      description: "Mirror group pairing two accounts (config.Mirror)"
      required: [account_src, account_dst]
      properties:
        account_src:
          type: string
        account_dst:
          type: string
        repos:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/MirrorRepo"

    MirrorRepo:
      type: object
      description: "Single repo mirror relationship (config.MirrorRepo)"
      required: [direction, origin]
      properties:
        direction:
          type: string
          enum: ["push", "pull"]
        origin:
          type: string
          enum: ["src", "dst"]
          description: "Which account owns the source of truth"
        target_repo:
          type: string
          description: "Target full name (defaults to same as key)"
        method:
          type: string
          enum: ["api", "manual"]
        status:
          type: string
          enum: ["active", "paused", "error", "pending"]
        last_sync:
          type: string
          format: date-time
          description: "RFC3339 from last known sync"
        error:
          type: string

    # ══════════════════════════════════════════════════════════════
    # Wails DTO schemas (cmd/gui/app.go)
    # ══════════════════════════════════════════════════════════════

    ConfigDTO:
      type: object
      description: "JSON-friendly config sent to the frontend"
      properties:
        version:
          type: integer
        global:
          $ref: "#/components/schemas/GlobalConfig"
        accounts:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Account"
        sources:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SourceDTO"
        mirrors:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/MirrorDTO"

    SourceDTO:
      type: object
      description: "Source with ordered repo keys for frontend rendering"
      properties:
        account:
          type: string
        folder:
          type: string
        repos:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Repo"
        repoOrder:
          type: array
          items:
            type: string
          description: "Repo keys in JSON-preserved order"

    MirrorDTO:
      type: object
      description: "Mirror group with ordered repo keys for frontend rendering"
      properties:
        account_src:
          type: string
        account_dst:
          type: string
        repos:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/MirrorRepo"
        repoOrder:
          type: array
          items:
            type: string
          description: "Mirror repo keys in JSON-preserved order"

    StatusResult:
      type: object
      description: "Frontend-friendly repo sync status"
      properties:
        source:
          type: string
        repo:
          type: string
        account:
          type: string
        path:
          type: string
        state:
          type: string
          description: "Sync state string (e.g. 'ok', 'behind', 'dirty', 'not_cloned', 'error')"
        ahead:
          type: integer
        behind:
          type: integer
        modified:
          type: integer
        untracked:
          type: integer
        conflicts:
          type: integer
        error:
          type: string

    RepoDetail:
      type: object
      description: "Detailed file-level status for a single repo"
      properties:
        branch:
          type: string
        ahead:
          type: integer
        behind:
          type: integer
        changed:
          type: array
          items:
            $ref: "#/components/schemas/FileChange"
        untracked:
          type: array
          items:
            type: string
        error:
          type: string

    FileChange:
      type: object
      description: "A single changed file (git.FileChange)"
      properties:
        kind:
          type: string
          enum: ["modified", "added", "deleted", "renamed", "conflict"]
        path:
          type: string

    DiscoverResult:
      type: object
      description: "A repo found during discovery"
      properties:
        fullName:
          type: string
        description:
          type: string
        private:
          type: boolean
        fork:
          type: boolean
        archived:
          type: boolean

    CredentialSetupResult:
      type: object
      description: "Outcome of a credential setup step"
      properties:
        ok:
          type: boolean
        message:
          type: string
        needsPAT:
          type: boolean
          description: "True when SSH works but discovery needs a PAT"
        sshPublicKey:
          type: string
          description: "Public key to copy (SSH setup only)"
        sshAddURL:
          type: string
          description: "Provider URL to add the SSH key"
        sshVerified:
          type: boolean
          description: "True when SSH connection test passed"

    CredentialStatus:
      type: object
      description: "Result of verifying account credentials"
      properties:
        status:
          type: string
          enum: ["ok", "warning", "error", "none"]
        message:
          type: string

    TokenGuideInfo:
      type: object
      description: "Provider-specific PAT creation guidance"
      properties:
        creationURL:
          type: string
          format: uri
        scopes:
          type: string
          description: "Required token scopes"
        guide:
          type: string
          description: "Step-by-step setup guide text"

    MirrorCredentialCheck:
      type: object
      description: "Whether an account has a portable PAT for mirrors"
      properties:
        accountKey:
          type: string
        hasMirrorToken:
          type: boolean
        needsPat:
          type: boolean
          description: "True for GCM accounts that need a separate PAT"
        message:
          type: string

    MirrorStatusResult:
      type: object
      description: "Per-repo live mirror status sent to the frontend"
      properties:
        mirrorKey:
          type: string
        repoKey:
          type: string
        direction:
          type: string
          enum: ["push", "pull"]
        originAcct:
          type: string
        backupAcct:
          type: string
        syncStatus:
          type: string
          description: "synced, behind, or empty if unknown"
        headCommit:
          type: string
          description: "Short SHA when synced"
        originHead:
          type: string
          description: "Short SHA of origin when behind"
        backupHead:
          type: string
          description: "Short SHA of backup when behind"
        warning:
          type: string
        error:
          type: string

    MirrorSetupResult:
      type: object
      description: "Result of a mirror setup attempt"
      properties:
        repoKey:
          type: string
        created:
          type: boolean
          description: "Target repo was created"
        mirrored:
          type: boolean
          description: "Mirror was configured via API"
        method:
          type: string
          enum: ["api", "manual"]
        instructions:
          type: string
          description: "Step-by-step guide if method is manual"
        error:
          type: string

    AddAccountRequest:
      type: object
      description: "Frontend payload for creating an account"
      required: [key, provider, url, username]
      properties:
        key:
          type: string
          pattern: "^[a-zA-Z0-9][a-zA-Z0-9-]*$"
        provider:
          type: string
          enum: ["github", "gitlab", "gitea", "forgejo", "bitbucket"]
        url:
          type: string
          format: uri
        username:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        credentialType:
          type: string
          enum: ["gcm", "ssh", "token"]
          default: "gcm"

    UpdateAccountRequest:
      type: object
      description: "Frontend payload for editing an account"
      required: [key]
      properties:
        key:
          type: string
        provider:
          type: string
          enum: ["github", "gitlab", "gitea", "forgejo", "bitbucket"]
        url:
          type: string
          format: uri
        username:
          type: string
        name:
          type: string
        email:
          type: string
          format: email

    GlobalIdentityStatus:
      type: object
      description: "Whether ~/.gitconfig has global user.name/user.email"
      properties:
        hasName:
          type: boolean
        hasEmail:
          type: boolean
        name:
          type: string
        email:
          type: string

    DiscoveredMirror:
      type: object
      description: "A mirror relationship found during discovery (mirror.DiscoveredMirror)"
      properties:
        repoKey:
          type: string
          description: "org/repo on the origin side"
        targetRepo:
          type: string
          description: "Name on the backup side (if different)"
        direction:
          type: string
          enum: ["push", "pull"]
        origin:
          type: string
          enum: ["src", "dst"]
        confidence:
          type: string
          enum: ["confirmed", "likely", "possible"]

    DiscoveryResult:
      type: object
      description: "Discovered mirrors for one account pair (mirror.DiscoveryResult)"
      properties:
        mirrorKey:
          type: string
          description: "Suggested key for the mirror group"
        accountSrc:
          type: string
        accountDst:
          type: string
        discovered:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveredMirror"

    DiscoverProgress:
      type: object
      description: "Scanning progress callback payload (mirror.DiscoverProgress)"
      properties:
        phase:
          type: string
          enum: ["listing", "analyzing"]
        account:
          type: string
          description: "Account key being listed/analyzed"
        current:
          type: integer
          description: "Current repo index (analyzing phase)"
        total:
          type: integer
          description: "Total repos in this account (analyzing phase)"

    MirrorSummary:
      type: object
      description: "Summary of a mirror group without live API queries (mirror.MirrorSummary)"
      properties:
        mirrorKey:
          type: string
        accountSrc:
          type: string
        accountDst:
          type: string
        active:
          type: integer
        pending:
          type: integer
        error:
          type: integer
        total:
          type: integer
