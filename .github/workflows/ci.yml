name: CI

on:
  push:
    tags: ['v*']

jobs:
  # ── Go unit tests (fast, runs on all platforms) ──
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Run tests
        run: go test ./pkg/...

  # ── CLI cross-compile (from ubuntu, fast) ──
  cli:
    runs-on: ubuntu-latest
    needs: test
    env:
      LDFLAGS: >-
        -X main.version=${{ github.ref_name }}
        -X main.commit=${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Build CLI (linux/amd64)
        run: GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o build/gitboxcmd-linux-amd64 ./cmd/cli
      - name: Build CLI (darwin/arm64)
        run: GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o build/gitboxcmd-darwin-arm64 ./cmd/cli
      - name: Build CLI (windows/amd64)
        run: GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o build/gitboxcmd.exe ./cmd/cli
      - uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: build/gitboxcmd*

  # ── GUI build (native per platform, needs webview libs) ──
  gui-windows:
    runs-on: windows-latest
    needs: test
    env:
      LDFLAGS: >-
        -X main.version=${{ github.ref_name }}
        -X main.commit=${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
      - name: Build GUI
        working-directory: cmd/gui
        run: wails build -ldflags "$LDFLAGS"
      - uses: actions/upload-artifact@v4
        with:
          name: gui-windows
          path: cmd/gui/build/bin/gitbox.exe

  gui-macos:
    runs-on: macos-latest
    needs: test
    env:
      LDFLAGS: >-
        -X main.version=${{ github.ref_name }}
        -X main.commit=${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
      - name: Build GUI
        working-directory: cmd/gui
        run: wails build -ldflags "$LDFLAGS"
      - uses: actions/upload-artifact@v4
        with:
          name: gui-macos
          path: cmd/gui/build/bin/gitbox

  gui-linux:
    runs-on: ubuntu-latest
    needs: test
    env:
      LDFLAGS: >-
        -X main.version=${{ github.ref_name }}
        -X main.commit=${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
      - name: Build GUI
        working-directory: cmd/gui
        run: wails build -tags webkit2_41 -ldflags "$LDFLAGS"
      - uses: actions/upload-artifact@v4
        with:
          name: gui-linux
          path: cmd/gui/build/bin/gitbox
